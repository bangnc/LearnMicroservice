apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apigateway
  template:
    metadata:
      labels:
        app: apigateway
    spec:
      containers:
      - name: apigateway
        image: docker-apigateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7058