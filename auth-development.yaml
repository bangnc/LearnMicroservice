apiVersion: apps/v1
kind: Deployment

metadata:
  name: authservice
  namespace: microservices

spec:
  replicas: 2

  selector:
    matchLabels:
      app: authservice

  template:
    metadata:
      labels:
        app: authservice

    spec:
      containers:
        - name: authservice
          image: authservice:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 7092